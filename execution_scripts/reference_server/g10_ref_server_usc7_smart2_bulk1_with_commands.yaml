  - state_description: Finished Group 9.24.2 Granular Scopes 2
    status: done
    last_completed: 9.24.2
    start_run:
      runnable: 9.27
    action_description: Run Group 9.27 SMART Granular Scope Selection

  - state_description: Wait at test 9.27.3.02 OAuth server redirects client browser to app redirect URI
    status: waiting
    last_completed: 9.27.3.02
