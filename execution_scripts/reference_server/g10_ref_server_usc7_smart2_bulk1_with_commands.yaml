  - state_description: Wait at test 9.24.1.1.2.02 OAuth server redirects client browser to app redirect URI
    status: waiting
    last_completed: 9.24.1.1.2.02
    command: bundle exec ruby execution_scripts/reference_server/ref_server_authorize_85_all_scopes.rb '{wait_outputs.authorization_url}'
